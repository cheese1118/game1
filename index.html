    <!-- 音效與語音控制器 -->
    <script>
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioCtx();
            }
        }

        // 1. 播放效果音
        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, now); // A3
                osc.frequency.exponentialRampToValueAtTime(110, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'level-up') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(261.63, now); 
                osc.frequency.exponentialRampToValueAtTime(1046.5, now + 0.6);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            } else if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            }
        }

        // 2. 瀏覽器語音朗讀 (TTS) - 專為台灣語音優化
        let speakEnabled = true;
        function speak(text) {
            if (!speakEnabled) return;
            // 先停止之前的說話
            window.speechSynthesis.cancel();
            
            // 去除 HTML 標籤（如 <ruby>, <rt>），只留下純文字供語音讀出
            const cleanText = text.replace(/<[^>]*>/g, "");
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.85; // 稍微放慢速度，符合幼童聽力
            utterance.pitch = 1.1; // 稍微拉高音調，聽起來更親切活潑
            
            // 尋找台灣微軟或 Google 語音
            const voices = window.speechSynthesis.getVoices();
            const twVoice = voices.find(v => v.lang.includes('ZH-TW') || v.lang.includes('zh-TW'));
            if (twVoice) utterance.voice = twVoice;

            window.speechSynthesis.speak(utterance);
        }

        // 切換語音靜音
        function toggleSpeak() {
            speakEnabled = !speakEnabled;
            const btn = document.getElementById('speak-toggle-btn');
            if (speakEnabled) {
                btn.innerHTML = '🔊 語音：開';
                btn.className = 'bg-green-500 text-white font-bold text-xs px-3 py-1.5 rounded-full';
                speak("語音功能已經打開囉！");
            } else {
                btn.innerHTML = '🔇 語音：關';
                btn.className = 'bg-slate-400 text-white font-bold text-xs px-3 py-1.5 rounded-full';
                window.speechSynthesis.cancel();
            }
        }
    </script>

    <!-- 遊戲核心邏輯 -->
    <script>
        // 玩家狀態
        let player = {
            name: "小勇士",
            avatar: "🐯",
            stars: 0,
            coins: 50,
            unlockedToys: []
        };

        // 頁面加載時讀取本地進度（若有）
        window.onload = function() {
            const savedData = localStorage.getItem('preschool_adventure_player_v2');
            if (savedData) {
                player = JSON.parse(savedData);
            }
            updateStatusUI();
            setTimeout(() => {
                speak("歡迎來到暑假自習大冒險！點選一個島嶼開始挑戰吧！");
            }, 800);
        };

        function updateStatusUI() {
            document.getElementById('player-name').innerText = player.name;
            document.getElementById('player-avatar').innerText = player.avatar;
            document.getElementById('star-count').innerText = player.stars;
            document.getElementById('coin-count').innerText = player.coins;
            localStorage.setItem('preschool_adventure_player_v2', JSON.stringify(player));
        }

        // 語音按鈕點擊事件，方便反覆聆聽
        function repeatSpeech(textId) {
            const el = document.getElementById(textId);
            if (el) {
                speak(el.innerText);
            }
        }

        // 彈出視窗輔助函數
        function showModal(emoji, title, message, callback) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-emoji').innerText = emoji;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            const btn = document.getElementById('modal-btn');
            btn.onclick = function() {
                modal.classList.add('hidden');
                window.speechSynthesis.cancel();
                if (callback) callback();
            };
            modal.classList.remove('hidden');

            // 彈窗同時讀出內容
            speak(title + "。" + message);
        }

        // 角色設定
        function showCharacterModal() {
            document.getElementById('char-name-input').value = player.name;
            document.getElementById('character-modal').classList.remove('hidden');
            speak("請輸入你的名字，並選擇一個喜歡的動物頭像吧！");
        }

        let selectedTempAvatar = "🐯";
        function selectAvatar(avatar) {
            selectedTempAvatar = avatar;
            playSound('pop');
            const buttons = document.querySelectorAll('#character-modal button');
            buttons.forEach(btn => {
                if(btn.innerText === avatar) {
                    btn.classList.add('bg-orange-200', 'scale-110');
                } else {
                    btn.classList.remove('bg-orange-200', 'scale-110');
                }
            });
        }

        function saveCharacter() {
            const nameInput = document.getElementById('char-name-input').value.trim();
            if (nameInput) player.name = nameInput;
            player.avatar = selectedTempAvatar;
            updateStatusUI();
            document.getElementById('character-modal').classList.add('hidden');
            playSound('level-up');
            speak("設定成功！" + player.name + "，出發去冒險吧！");
        }

        function goHome() {
            window.speechSynthesis.cancel();
            document.getElementById('game-zone').classList.add('hidden');
            document.getElementById('main-map').classList.remove('hidden');
        }

        function awardReward(stars, coins) {
            player.stars += stars;
            player.coins += coins;
            updateStatusUI();
        }

        // ==========================================
        // 關卡 1：ㄅㄆㄇ魔法島 (拼音認字連連看 - 含注音與朗讀)
        // ==========================================

            { 
                img: "🍎", 
                wordHtml: "<ruby>蘋<rt>ㄆㄧㄥˊ</rt></ruby><ruby>果<rt>ㄍㄨㄛˇ</rt></ruby>", 
                wordPlain: "蘋果",
                choices: ["ㄆ", "ㄅ", "ㄇ", "ㄈ"], 
                correct: "ㄆ", 
                hintHtml: "<ruby>ㄆ<rt>ㄆ</rt></ruby><ruby>ㄧ<rt>ㄧ</rt></ruby><ruby>ng<rt>ㄥˊ</rt></ruby> <ruby>ㄍ<rt>ㄍ</rt></ruby><ruby>ㄨ<rt>ㄨ</rt></ruby><ruby>ㄛ<rt>ㄛˇ</rt></ruby>",
                hintPlain: "ㄆㄧㄥˊ ㄍㄨㄛˇ"
            },
            { 
                img: "🐱", 
                wordHtml: "<ruby>貓<rt>ㄇㄠ</rt></ruby><ruby>咪<rt>ㄇㄧ</rt></ruby>", 
                wordPlain: "貓咪",
